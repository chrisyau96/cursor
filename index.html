<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="description" content="Momentum — a mobile habit tracker with records, streaks, and trend reports." />
  <title>Momentum · Habit Tracker</title>
  <link rel="icon" href="assets/icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icon-180.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Momentum" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <!-- Top bar -->
    <header class="topbar" id="topbar">
      <div class="topbar-left">
        <h1 class="topbar-title" id="topbarTitle">Today</h1>
        <p class="topbar-sub" id="topbarSub"></p>
      </div>
      <div class="topbar-actions" id="topbarActions"></div>
    </header>

    <!-- Main scroll area, views injected here -->
    <main class="view-host" id="viewHost"></main>

    <!-- Bottom navigation -->
    <nav class="tabbar" id="tabbar">
      <button class="tab" data-view="today" aria-label="Today">
        <span class="tab-ico">📋</span><span class="tab-label">Today</span>
      </button>
      <button class="tab" data-view="calendar" aria-label="Calendar">
        <span class="tab-ico">🗓️</span><span class="tab-label">Calendar</span>
      </button>
      <button class="tab tab-fab" data-action="add-habit" aria-label="Add habit">
        <span class="fab-plus">+</span>
      </button>
      <button class="tab" data-view="reports" aria-label="Reports">
        <span class="tab-ico">📊</span><span class="tab-label">Reports</span>
      </button>
      <button class="tab" data-view="rewards" aria-label="Rewards">
        <span class="tab-ico">🎁</span><span class="tab-label">Rewards</span>
      </button>
    </nav>
  </div>

  <!-- Modal / sheet host -->
  <div class="sheet-host" id="sheetHost" hidden>
    <div class="sheet-backdrop" data-close="1"></div>
    <div class="sheet" id="sheet" role="dialog" aria-modal="true"></div>
  </div>

  <!-- Toast host -->
  <div class="toast-host" id="toastHost" aria-live="polite"></div>

  <script type="module" src="assets/js/app.js"></script>
  <script>
    // Register the service worker for offline / installable PWA support.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW registration failed", e));
      });
    }
  </script>
</body>
</html>
